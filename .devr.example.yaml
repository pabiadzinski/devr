# All values shown are defaults.
# Copy to .devr.yaml and adjust as needed.

build:
  cmd_pattern: "cmd/*/main.go"
  race: true            # --race=false to disable
  flags: []             # extra go build flags, e.g. ["-trimpath"]

run:
  env_file: ".env"
  no_env: false

watch:
  dirs: ["."]
  extensions: [".go"]
  exclude: ["vendor", "node_modules"]
  debounce: 500ms
